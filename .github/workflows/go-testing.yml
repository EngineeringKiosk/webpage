name: Go testing

on:
  push:
    branches:
      - main
    paths:
      - 'website-admin/**'
  pull_request:
    paths:
      - 'website-admin/**'
  workflow_dispatch:

jobs:
  testing:
    name: Testing (Go)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: website-admin

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache: false

      - name: Run go version
        run: go version

      - name: Run Unit tests.
        run: make test

  golangci:
    name: Linting (Go)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: website-admin

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache: false

      - name: Run go version
        run: go version

      - name: Run go fmt
        if: runner.os != 'Windows'
        run: diff -u <(echo -n) <(gofmt -d -s .)

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.12.2
          working-directory: website-admin

      # golangci-lint contains only a set of rules from staticcheck.
      # It's not the same thing as the staticcheck binary.
      # Hence we deactivate it above and run it alone.
      # See https://golangci-lint.run/usage/linters/#enabled-by-default
      - name: Run staticcheck
        run: make staticcheck

  compile:
    name: Compile application
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: website-admin
    needs: [testing, golangci]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"

      - name: Run go version
        run: go version

      - name: Build
        run: make build
